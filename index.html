<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시간의 덧셈과 뺄셈</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff8e7;
    --bg-2: #fff1d0;
    --ink: #2d3142;
    --line: #4a4e69;
    --hour: #ff6b6b;
    --hour-soft: #ffd6d6;
    --min: #4ecdc4;
    --min-soft: #d4f5f2;
    --sec: #ffa94d;
    --sec-soft: #ffe4c4;
    --accent: #ffd23f;
    --paper: #ffffff;
    --shadow: 0 4px 0 rgba(45,49,66,0.15);
    --digital-bg: #1a1d2e;
    --digital-ink: #ffd23f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Gaegu', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 20%, var(--bg-2) 0%, transparent 30%),
      radial-gradient(circle at 90% 80%, var(--bg-2) 0%, transparent 30%);
    color: var(--ink);
    min-height: 100vh;
    padding: 20px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 18px; }
  h1 {
    font-family: 'Jua', sans-serif;
    font-size: 2.2rem;
    color: var(--ink);
    letter-spacing: 3px;
    font-weight: 400;
  }
  .subtitle {
    font-family: 'Jua', sans-serif;
    font-size: 1.1rem;
    color: var(--line);
    margin-top: 4px;
  }

  /* 모드 탭 */
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    justify-content: center;
  }
  .mode-tab {
    flex: 1;
    max-width: 300px;
    font-family: 'Jua', sans-serif;
    font-size: 1.3rem;
    padding: 14px 20px;
    border: 3px solid var(--ink);
    border-radius: 14px;
    cursor: pointer;
    background: var(--paper);
    box-shadow: var(--shadow);
    transition: all 0.15s;
  }
  .mode-tab:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(45,49,66,0.2); }
  .mode-tab.active {
    background: var(--accent);
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(45,49,66,0.15);
  }

  /* 입력 영역 */
  .setup {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 18px;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .setup-title {
    font-family: 'Jua', sans-serif;
    font-size: 1.6rem;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .setup-title::before { content: "✏️"; font-size: 1.8rem; }
  .input-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
    font-family: 'Jua', sans-serif;
    font-size: 1.4rem;
  }
  .input-row .label {
    min-width: 240px;
    flex-shrink: 0;
    font-weight: 700;
  }
  .input-row.row-a .label { color: var(--hour); }
  .input-row.row-b .label { color: var(--line); }
  input[type="number"] {
    width: 90px;
    padding: 8px 10px;
    font-family: 'Jua', sans-serif;
    font-size: 1.5rem;
    border: 3px solid var(--ink);
    border-radius: 10px;
    text-align: center;
    background: var(--bg);
  }
  input[type="number"]:focus {
    outline: none;
    background: var(--accent);
  }
  .unit { font-weight: 700; font-size: 1.4rem; }
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  button {
    font-family: 'Jua', sans-serif;
    font-size: 1.2rem;
    padding: 12px 22px;
    border: 3px solid var(--ink);
    border-radius: 12px;
    cursor: pointer;
    background: var(--paper);
    box-shadow: var(--shadow);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(45,49,66,0.2); }
  button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(45,49,66,0.15); }
  .btn-start { background: var(--accent); }
  .btn-reset { background: var(--hour-soft); }
  .btn-auto { background: var(--min-soft); }
  .btn-random { background: var(--sec-soft); }
  .err {
    color: #d62828;
    font-family: 'Jua', sans-serif;
    font-size: 1.1rem;
    margin-top: 10px;
    min-height: 1.4em;
  }

  /* 작업 영역 */
  .workspace {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 18px;
    padding: 20px;
    box-shadow: var(--shadow);
  }

  /* 표 구조: 라벨 | 시 | 분 | 초 */
  .equation {
    display: grid;
    grid-template-columns: 200px 1fr 1fr 1fr;
    gap: 12px;
    align-items: stretch;
  }
  .col-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jua', sans-serif;
    font-size: 1.6rem;
    border-radius: 12px;
    padding: 10px;
    font-weight: 700;
  }
  .col-label.hour { background: var(--hour-soft); color: var(--hour); }
  .col-label.min { background: var(--min-soft); color: var(--min); }
  .col-label.sec { background: var(--sec-soft); color: var(--sec); }
  .col-label.empty { visibility: hidden; }

  .row-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'Jua', sans-serif;
    font-size: 1.15rem;
    background: var(--bg);
    border-radius: 12px;
    border: 2px dashed var(--line);
    padding: 8px 6px;
    line-height: 1.3;
    position: relative;
  }
  .row-label .op-symbol {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--line);
    margin-top: 4px;
  }
  .row-label.result {
    background: var(--accent);
    border: 3px solid var(--ink);
    border-style: solid;
    font-weight: 700;
  }

  /* 셀 (각 자리) */
  .cell {
    background: var(--bg);
    border-radius: 12px;
    padding: 10px;
    border: 2px solid var(--line);
    min-height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .cell.result {
    background: var(--accent);
    border: 3px solid var(--ink);
  }

  /* 디지털 숫자 표시 (시각용) */
  .digital {
    background: var(--digital-bg);
    color: var(--digital-ink);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 3.5rem;
    padding: 12px 18px;
    border-radius: 10px;
    letter-spacing: 2px;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
    text-shadow: 0 0 8px rgba(255,210,63,0.6);
    min-width: 130px;
    text-align: center;
    line-height: 1;
  }
  .digital.result {
    color: #6eff8e;
    text-shadow: 0 0 10px rgba(110,255,142,0.7);
  }

  /* 점·동그라미 표시 (시간 양용) */
  .quantity-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    text-align: center;
    margin-bottom: 8px;
  }
  .cell.hour .quantity-num { color: var(--hour); }
  .cell.min .quantity-num { color: var(--min); }
  .cell.sec .quantity-num { color: var(--sec); }
  .cell.result .quantity-num { color: var(--ink); }

  .bundles {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    align-items: flex-start;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .bundle {
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 10px;
    padding: 5px;
    display: grid;
    grid-template-columns: repeat(5, 14px);
    grid-template-rows: 14px;
    gap: 3px;
  }
  .bundle.partial {
    border-style: dashed;
    background: rgba(255,255,255,0.5);
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s;
    cursor: default;
    touch-action: none;
  }
  .cell.hour .dot { background: var(--hour); }
  .cell.min .dot { background: var(--min); }
  .cell.sec .dot { background: var(--sec); }
  .cell.result .dot { background: var(--ink); }

  .dot.removable { cursor: pointer; }
  .dot.removable:hover {
    transform: scale(1.25);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.8), 0 0 0 5px rgba(45,49,66,0.3);
  }
  .dot.removed {
    background: transparent !important;
    border: 2px dashed rgba(45,49,66,0.3);
    transform: scale(0.85);
    opacity: 0.5;
  }
  .dot.pending {
    background: transparent !important;
    border: 2px dashed var(--ink);
    opacity: 0.55;
    cursor: pointer;
    animation: gentle-pulse 1.8s ease-in-out infinite;
  }
  .dot.pending:hover {
    transform: scale(1.25);
    opacity: 1;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.8), 0 0 0 5px rgba(45,49,66,0.3);
  }
  @keyframes gentle-pulse {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 0.85; }
  }

  /* 메시지 / 정답 */
  .message {
    background: var(--bg);
    border: 2px dashed var(--line);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'Jua', sans-serif;
    font-size: 1.15rem;
    text-align: center;
    margin-top: 16px;
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .message.success {
    background: var(--accent);
    animation: bounce 0.5s;
  }
  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* 모바일/크롬북 작은 화면 */
  @media (max-width: 820px) {
    .equation {
      grid-template-columns: 110px 1fr 1fr 1fr;
      gap: 6px;
    }
    .cell { padding: 6px; min-height: 110px; }
    .digital { font-size: 2.2rem; padding: 8px 10px; min-width: 80px; }
    .bundle {
      grid-template-columns: repeat(5, 11px);
      grid-template-rows: 11px;
      gap: 2px;
      padding: 4px;
    }
    .dot { width: 11px; height: 11px; }
    .col-label { font-size: 1.1rem; padding: 6px; }
    .row-label { font-size: 0.95rem; }
    .row-label .op-symbol { font-size: 1.3rem; }
    h1 { font-size: 1.6rem; }
    .input-row { font-size: 1.1rem; }
    .input-row .label { width: 100%; }
    input[type="number"] { width: 70px; font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⏰ 시간의 덧셈과 뺄셈 ⏰</h1>
    <div class="subtitle" id="main-subtitle">받아올림이 없는 시·분·초 더하기 (초등 3학년 1학기)</div>
  </header>

  <!-- 모드 탭 -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-add" onclick="switchMode('add')">➕ 시간의 덧셈</button>
    <button class="mode-tab" id="tab-sub" onclick="switchMode('sub')">➖ 시간의 뺄셈</button>
  </div>

  <!-- 문제 입력 -->
  <section class="setup">
    <div class="setup-title">문제 만들기</div>
    <div class="input-row row-a">
      <span class="label" id="label-a">지금 시각</span>
      <input type="number" id="a-h" min="1" max="12" value="3"><span class="unit">시</span>
      <input type="number" id="a-m" min="0" max="59" value="20"><span class="unit">분</span>
      <input type="number" id="a-s" min="0" max="59" value="15"><span class="unit">초</span>
    </div>
    <div class="input-row row-b">
      <span class="label" id="label-b">버스가 도착하는데 걸리는 시간 +</span>
      <input type="number" id="b-h" min="0" max="12" value="4"><span class="unit">시</span>
      <input type="number" id="b-m" min="0" max="59" value="25"><span class="unit">분</span>
      <input type="number" id="b-s" min="0" max="59" value="14"><span class="unit">초</span>
    </div>
    <div class="btn-row">
      <button class="btn-start" onclick="startProblem()">🎯 문제 시작!</button>
      <button class="btn-random" onclick="randomProblem()">🎲 랜덤 문제</button>
      <button class="btn-auto" onclick="autoSolve()">✨ 자동으로 풀기</button>
      <button class="btn-reset" onclick="resetProblem()">🔄 처음으로</button>
    </div>
    <div class="err" id="err"></div>
  </section>

  <!-- 작업 영역 -->
  <section class="workspace">
    <div class="equation" id="equation">
      <!-- 헤더 -->
      <div class="col-label empty"></div>
      <div class="col-label hour">시</div>
      <div class="col-label min">분</div>
      <div class="col-label sec">초</div>

      <!-- 행들은 자바스크립트가 동적으로 채움 -->
    </div>

    <div class="message" id="message">
      문제를 입력하고 <b>"문제 시작!"</b> 버튼을 눌러보세요 😊
    </div>
  </section>
</div>

<script>
// ===== 상태 =====
const state = {
  mode: 'add',
  a: { h: 0, m: 0, s: 0 },  // 덧셈: 지금시각 / 뺄셈: 다음시각
  b: { h: 0, m: 0, s: 0 },  // 덧셈: 걸리는 시간 / 뺄셈: 처음시각
  c: { h: 0, m: 0, s: 0 },  // 결과 (A+B 또는 A-B)
  todo: { h: 0, m: 0, s: 0 },     // 처리해야 할 양
  dots: { h: [], m: [], s: [] },  // 결과 칸의 점 처리 상태
  totals: { h: 0, m: 0, s: 0 },   // 결과 칸 점 총 개수
  active: false,
  dragging: false,
  dragKind: null,
};

// ===== 유틸 =====
function $(id) { return document.getElementById(id); }
function setMessage(text, success = false) {
  const m = $('message');
  m.innerHTML = text;
  m.classList.toggle('success', success);
}
function pad2(n) { return String(n).padStart(2, '0'); }

// ===== 딸깍 소리 =====
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playClick() {
  ensureAudio();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(880, now);
  o.frequency.exponentialRampToValueAtTime(440, now + 0.06);
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(0.25, now + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
  o.connect(g).connect(audioCtx.destination);
  o.start(now);
  o.stop(now + 0.1);
}
function playSuccess() {
  ensureAudio();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  [523.25, 659.25, 783.99].forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(freq, now + i * 0.12);
    g.gain.setValueAtTime(0.0001, now + i * 0.12);
    g.gain.exponentialRampToValueAtTime(0.2, now + i * 0.12 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.12 + 0.18);
    o.connect(g).connect(audioCtx.destination);
    o.start(now + i * 0.12);
    o.stop(now + i * 0.12 + 0.2);
  });
}

// ===== 모드 전환 =====
function switchMode(mode) {
  state.mode = mode;
  const isAdd = (mode === 'add');
  $('tab-add').classList.toggle('active', isAdd);
  $('tab-sub').classList.toggle('active', !isAdd);
  $('main-subtitle').textContent = isAdd
    ? '받아올림이 없는 시·분·초 더하기 (초등 3학년 1학기)'
    : '받아내림이 없는 시·분·초 빼기 (초등 3학년 1학기)';

  if (isAdd) {
    // 덧셈: 지금시각 + 걸리는 시간 = 도착시각
    $('label-a').textContent = '지금 시각';
    $('label-b').textContent = '버스가 도착하는데 걸리는 시간 +';
    $('a-h').value = 3; $('a-m').value = 20; $('a-s').value = 15;
    $('b-h').value = 4; $('b-m').value = 25; $('b-s').value = 14;
  } else {
    // 뺄셈: 다음시각 - 처음시각 = 가능 시간
    $('label-a').textContent = '다음 시각';
    $('label-b').textContent = '처음 시각 −';
    $('a-h').value = 8; $('a-m').value = 45; $('a-s').value = 30;
    $('b-h').value = 3; $('b-m').value = 20; $('b-s').value = 15;
  }
  resetProblem();
}

// ===== 디지털 시계 셀 만들기 =====
function renderDigital(cellId, value) {
  const cell = $(cellId);
  cell.innerHTML = '';
  const d = document.createElement('div');
  d.className = 'digital';
  d.textContent = pad2(value);
  cell.appendChild(d);
}
function renderDigitalResult(cellId, value) {
  const cell = $(cellId);
  cell.innerHTML = '';
  const d = document.createElement('div');
  d.className = 'digital result';
  d.textContent = pad2(value);
  cell.appendChild(d);
}
function renderEmptyDigital(cellId) {
  const cell = $(cellId);
  cell.innerHTML = '';
  const d = document.createElement('div');
  d.className = 'digital';
  d.textContent = '--';
  d.style.color = '#555';
  d.style.textShadow = 'none';
  cell.appendChild(d);
}

// ===== 점·묶음 셀 만들기 =====
function renderQuantity(cellId, kind, value) {
  // 점 5개씩 묶음으로, 동작 없는 표시용 (B행에서 사용)
  const cell = $(cellId);
  cell.innerHTML = '';
  const numDiv = document.createElement('div');
  numDiv.className = 'quantity-num';
  numDiv.textContent = value;
  cell.appendChild(numDiv);
  const bundles = document.createElement('div');
  bundles.className = 'bundles';
  cell.appendChild(bundles);
  drawBundlesInto(bundles, value, () => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    return dot;
  });
}

function drawBundlesInto(container, total, makeDotFn) {
  const fullBundles = Math.floor(total / 5);
  const leftover = total % 5;
  for (let b = 0; b < fullBundles; b++) {
    const bundle = document.createElement('div');
    bundle.className = 'bundle';
    for (let i = 0; i < 5; i++) bundle.appendChild(makeDotFn());
    container.appendChild(bundle);
  }
  if (leftover > 0) {
    const bundle = document.createElement('div');
    bundle.className = 'bundle partial';
    for (let i = 0; i < leftover; i++) bundle.appendChild(makeDotFn());
    container.appendChild(bundle);
  }
}

// ===== 작업영역 헬퍼: 행 추가 =====
function buildEquationRow(opts) {
  // opts: { rowLabelHTML, rowLabelClass, cells: [{kind, type, value, interactive}] }
  // type: 'digital' (시각) | 'quantity' (점·동그라미) | 'empty'
  // interactive: 결과 칸인 경우 true (점을 클릭/드래그 가능)
  const eq = $('equation');
  const labelDiv = document.createElement('div');
  labelDiv.className = 'row-label' + (opts.rowLabelClass ? ' ' + opts.rowLabelClass : '');
  labelDiv.innerHTML = opts.rowLabelHTML;
  eq.appendChild(labelDiv);

  opts.cells.forEach(c => {
    const cellDiv = document.createElement('div');
    let classes = 'cell ' + c.kind;
    if (c.cellClass) classes += ' ' + c.cellClass;
    cellDiv.className = classes;
    if (c.type === 'digital') {
      const d = document.createElement('div');
      d.className = 'digital' + (c.resultStyle ? ' result' : '');
      d.textContent = pad2(c.value);
      cellDiv.appendChild(d);
    } else if (c.type === 'quantity') {
      const numDiv = document.createElement('div');
      numDiv.className = 'quantity-num';
      numDiv.textContent = c.value;
      cellDiv.appendChild(numDiv);
      const bundles = document.createElement('div');
      bundles.className = 'bundles';
      cellDiv.appendChild(bundles);
      if (c.interactive) {
        // 인터랙티브: state.dots 사용
        const kind = c.kind;
        const total = state.totals[kind];
        let drawn = 0;
        const fullBundles = Math.floor(total / 5);
        const leftover = total % 5;
        const makeInteractiveDot = (index) => {
          const dot = document.createElement('div');
          dot.className = 'dot';
          dot.dataset.kind = kind;
          dot.dataset.index = index;
          // 뺄셈: 처리되면 지워진 표시
          if (state.dots[kind][index]) {
            dot.classList.add('removed');
          } else {
            if (state.todo[kind] > 0) dot.classList.add('removable');
            dot.addEventListener('pointerdown', onDotPointerDown);
            dot.addEventListener('pointerenter', onDotPointerEnter);
          }
          return dot;
        };
        for (let b = 0; b < fullBundles; b++) {
          const bundle = document.createElement('div');
          bundle.className = 'bundle';
          for (let i = 0; i < 5; i++) {
            bundle.appendChild(makeInteractiveDot(drawn));
            drawn++;
          }
          bundles.appendChild(bundle);
        }
        if (leftover > 0) {
          const bundle = document.createElement('div');
          bundle.className = 'bundle partial';
          for (let i = 0; i < leftover; i++) {
            bundle.appendChild(makeInteractiveDot(drawn));
            drawn++;
          }
          bundles.appendChild(bundle);
        }
      } else {
        // 표시용 점들
        drawBundlesInto(bundles, c.value, () => {
          const dot = document.createElement('div');
          dot.className = 'dot';
          return dot;
        });
      }
    } else if (c.type === 'empty') {
      const d = document.createElement('div');
      d.className = 'digital';
      d.textContent = '--';
      d.style.color = '#555';
      d.style.textShadow = 'none';
      cellDiv.appendChild(d);
    }
    eq.appendChild(cellDiv);
  });
}

function clearEquation() {
  const eq = $('equation');
  // 헤더(4개) 제외하고 모두 제거
  while (eq.children.length > 4) {
    eq.removeChild(eq.lastChild);
  }
}

// ===== 결과 셀(덧셈용, 인터랙티브 - 채우기) =====
function renderAddResultCell(kind) {
  // 덧셈은 단일 행 결과: a + b
  // 점은 a + b 총 개수, 앞의 a는 이미 있음, 뒤의 b는 pending
  const cell = document.createElement('div');
  cell.className = 'cell result ' + (kind==='h'?'hour':kind==='m'?'min':'sec');
  const d = document.createElement('div');
  d.className = 'digital result';
  d.style.fontSize = '2rem';
  d.style.padding = '8px 10px';
  d.style.minWidth = '70px';
  d.style.marginBottom = '8px';
  const processedCount = state.dots[kind].filter(v => v).length;
  const currentVal = state.a[kind] + processedCount;
  d.textContent = pad2(currentVal);
  cell.appendChild(d);

  const bundles = document.createElement('div');
  bundles.className = 'bundles';
  cell.appendChild(bundles);

  const total = state.totals[kind];
  let drawn = 0;
  const fullBundles = Math.floor(total / 5);
  const leftover = total % 5;
  const makeDot = (index) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.dataset.kind = kind;
    dot.dataset.index = index;
    if (index < state.a[kind]) {
      // 이미 있음 → 실선
    } else {
      if (state.dots[kind][index]) {
        // 채워짐 → 실선
      } else {
        dot.classList.add('pending');
        dot.addEventListener('pointerdown', onDotPointerDown);
        dot.addEventListener('pointerenter', onDotPointerEnter);
      }
    }
    return dot;
  };
  for (let b = 0; b < fullBundles; b++) {
    const bundle = document.createElement('div');
    bundle.className = 'bundle';
    for (let i = 0; i < 5; i++) {
      bundle.appendChild(makeDot(drawn));
      drawn++;
    }
    bundles.appendChild(bundle);
  }
  if (leftover > 0) {
    const bundle = document.createElement('div');
    bundle.className = 'bundle partial';
    for (let i = 0; i < leftover; i++) {
      bundle.appendChild(makeDot(drawn));
      drawn++;
    }
    bundles.appendChild(bundle);
  }
  return cell;
}

// ===== 점 처리 =====
function actAt(kind, index) {
  if (!state.active) return;
  if (state.dots[kind][index]) return;
  if (state.todo[kind] <= 0) return;
  const isAdd = (state.mode === 'add');
  if (isAdd && index < state.a[kind]) return;

  playClick();
  state.dots[kind][index] = true;
  state.todo[kind] -= 1;
  refresh();
  checkDone();
}

// ===== 드래그 이벤트 =====
function onDotPointerDown(e) {
  if (!state.active) return;
  e.preventDefault();
  const kind = e.currentTarget.dataset.kind;
  const idx = parseInt(e.currentTarget.dataset.index, 10);
  state.dragging = true;
  state.dragKind = kind;
  try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
  actAt(kind, idx);
}
function onDotPointerEnter(e) {
  if (!state.dragging || !state.active) return;
  const kind = e.currentTarget.dataset.kind;
  if (kind !== state.dragKind) return;
  const idx = parseInt(e.currentTarget.dataset.index, 10);
  actAt(kind, idx);
}
function onPointerUpAnywhere() {
  state.dragging = false;
  state.dragKind = null;
}
window.addEventListener('pointerup', onPointerUpAnywhere);
window.addEventListener('pointercancel', onPointerUpAnywhere);

// ===== 화면 갱신 =====
function refresh() {
  clearEquation();
  const eq = $('equation');
  const isAdd = (state.mode === 'add');

  if (isAdd) {
    // 행 1: 지금 시각 (디지털)
    buildEquationRow({
      rowLabelHTML: '지금<br>시각',
      cells: [
        { kind: 'hour', type: 'digital', value: state.a.h },
        { kind: 'min', type: 'digital', value: state.a.m },
        { kind: 'sec', type: 'digital', value: state.a.s },
      ]
    });
    // 행 2: 버스 도착하는데 걸리는 시간 (디지털)
    buildEquationRow({
      rowLabelHTML: '<span>버스가 도착하는데<br>걸리는 시간</span><span class="op-symbol">+</span>',
      cells: [
        { kind: 'hour', type: 'digital', value: state.b.h },
        { kind: 'min', type: 'digital', value: state.b.m },
        { kind: 'sec', type: 'digital', value: state.b.s },
      ]
    });
    // 행 3: 결과 (디지털 + 채울 점들)
    const labelDiv = document.createElement('div');
    labelDiv.className = 'row-label result';
    labelDiv.innerHTML = '버스 도착<br>시각';
    eq.appendChild(labelDiv);
    eq.appendChild(renderAddResultCell('h'));
    eq.appendChild(renderAddResultCell('m'));
    eq.appendChild(renderAddResultCell('s'));
  } else {
    // 행 1: 다음 시각 (디지털)
    buildEquationRow({
      rowLabelHTML: '다음<br>시각',
      cells: [
        { kind: 'hour', type: 'digital', value: state.a.h },
        { kind: 'min', type: 'digital', value: state.a.m },
        { kind: 'sec', type: 'digital', value: state.a.s },
      ]
    });
    // 행 2: 처음 시각 (디지털)
    buildEquationRow({
      rowLabelHTML: '<span>처음<br>시각</span><span class="op-symbol">−</span>',
      cells: [
        { kind: 'hour', type: 'digital', value: state.b.h },
        { kind: 'min', type: 'digital', value: state.b.m },
        { kind: 'sec', type: 'digital', value: state.b.s },
      ]
    });
    // 행 3: 결과 (점·동그라미, 인터랙티브)
    const labelDiv = document.createElement('div');
    labelDiv.className = 'row-label result';
    labelDiv.innerHTML = '가능<br>시간';
    eq.appendChild(labelDiv);
    eq.appendChild(renderSubResultCell('h'));
    eq.appendChild(renderSubResultCell('m'));
    eq.appendChild(renderSubResultCell('s'));
  }
}

// 뺄셈 결과 셀: A에서 시작하여 B만큼 지우는 인터랙티브 점들
function renderSubResultCell(kind) {
  const cell = document.createElement('div');
  cell.className = 'cell result ' + (kind==='h'?'hour':kind==='m'?'min':'sec');
  const numDiv = document.createElement('div');
  numDiv.className = 'quantity-num';
  const processedCount = state.dots[kind].filter(v => v).length;
  const currentVal = state.a[kind] - processedCount;
  numDiv.textContent = currentVal;
  cell.appendChild(numDiv);
  const bundles = document.createElement('div');
  bundles.className = 'bundles';
  cell.appendChild(bundles);
  const total = state.totals[kind];
  let drawn = 0;
  const fullBundles = Math.floor(total / 5);
  const leftover = total % 5;
  const makeDot = (index) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.dataset.kind = kind;
    dot.dataset.index = index;
    if (state.dots[kind][index]) {
      dot.classList.add('removed');
    } else {
      if (state.todo[kind] > 0) dot.classList.add('removable');
      dot.addEventListener('pointerdown', onDotPointerDown);
      dot.addEventListener('pointerenter', onDotPointerEnter);
    }
    return dot;
  };
  for (let b = 0; b < fullBundles; b++) {
    const bundle = document.createElement('div');
    bundle.className = 'bundle';
    for (let i = 0; i < 5; i++) { bundle.appendChild(makeDot(drawn)); drawn++; }
    bundles.appendChild(bundle);
  }
  if (leftover > 0) {
    const bundle = document.createElement('div');
    bundle.className = 'bundle partial';
    for (let i = 0; i < leftover; i++) { bundle.appendChild(makeDot(drawn)); drawn++; }
    bundles.appendChild(bundle);
  }
  return cell;
}

function checkDone() {
  if (state.todo.h === 0 && state.todo.m === 0 && state.todo.s === 0) {
    const isAdd = (state.mode === 'add');
    if (isAdd) {
      const r = `${state.c.h}시 ${state.c.m}분 ${state.c.s}초`;
      setMessage(`🎉 정답! 버스가 <b>${r}</b>에 도착해요! 🚌`, true);
    } else {
      const r = `${state.c.h}시간 ${state.c.m}분 ${state.c.s}초`;
      setMessage(`🎉 정답! <b>${r}</b> 동안 자유롭게 보낼 수 있어요! 🥐`, true);
    }
    if (state.active) playSuccess();
    state.active = false;
  } else {
    let parts = [];
    if (state.todo.h > 0) parts.push(`<b style="color:var(--hour)">${state.todo.h}시</b>`);
    if (state.todo.m > 0) parts.push(`<b style="color:var(--min)">${state.todo.m}분</b>`);
    if (state.todo.s > 0) parts.push(`<b style="color:var(--sec)">${state.todo.s}초</b>`);
    const verb = (state.mode === 'add') ? '채워볼까요' : '지워볼까요';
    setMessage(`👉 ${parts.join(' ')} 만큼 더 ${verb}?`);
  }
}

// ===== 문제 시작 =====
function startProblem() {
  ensureAudio();
  $('err').textContent = '';
  const isAdd = (state.mode === 'add');

  const ah = parseInt($('a-h').value, 10);
  const am = parseInt($('a-m').value, 10);
  const as = parseInt($('a-s').value, 10);

  if ([ah, am, as].some(v => isNaN(v))) {
    $('err').textContent = '모든 칸에 숫자를 넣어주세요!'; return;
  }
  if (am < 0 || am > 59 || as < 0 || as > 59) {
    $('err').textContent = '분과 초는 0~59 사이로 넣어주세요!'; return;
  }
  if (ah < 1 || ah > 12) { $('err').textContent = '첫 줄의 시는 1~12 사이로 넣어주세요!'; return; }

  if (isAdd) {
    const bh = parseInt($('b-h').value, 10);
    const bm = parseInt($('b-m').value, 10);
    const bs = parseInt($('b-s').value, 10);
    if ([bh, bm, bs].some(v => isNaN(v))) {
      $('err').textContent = '모든 칸에 숫자를 넣어주세요!'; return;
    }
    if (bm < 0 || bm > 59 || bs < 0 || bs > 59) {
      $('err').textContent = '분과 초는 0~59 사이로 넣어주세요!'; return;
    }
    if (bh < 0 || bh > 12) { $('err').textContent = '버스가 도착하는데 걸리는 시간(시)은 0~12 사이로!'; return; }
    if (ah + bh > 12) { $('err').textContent = '⚠️ "시"에서 받아올림이 생겨요. 두 시의 합이 12를 넘지 않게 해주세요.'; return; }
    if (am + bm > 59) { $('err').textContent = '⚠️ "분"에서 받아올림이 생겨요. 두 분의 합이 60을 넘지 않게 해주세요.'; return; }
    if (as + bs > 59) { $('err').textContent = '⚠️ "초"에서 받아올림이 생겨요. 두 초의 합이 60을 넘지 않게 해주세요.'; return; }
    state.a = { h: ah, m: am, s: as };
    state.b = { h: bh, m: bm, s: bs };
    state.c = { h: ah + bh, m: am + bm, s: as + bs };
    state.todo = { h: bh, m: bm, s: bs };
    state.totals = { h: ah + bh, m: am + bm, s: as + bs };
    state.dots = {
      h: new Array(state.totals.h).fill(false),
      m: new Array(state.totals.m).fill(false),
      s: new Array(state.totals.s).fill(false),
    };
    state.active = true;
    refresh();
    if (bh === 0 && bm === 0 && bs === 0) {
      setMessage('걸리는 시간이 0이에요. 그대로가 답이 돼요!');
    } else {
      setMessage('💡 결과 칸의 <b>점선 동그라미</b>를 클릭/드래그해서 채워봐요! ✏️');
    }
  } else {
    // 뺄셈: 단순 1:1 빼기 (다음시각 - 처음시각 = 가능시간)
    const bh = parseInt($('b-h').value, 10);
    const bm = parseInt($('b-m').value, 10);
    const bs = parseInt($('b-s').value, 10);
    if ([bh, bm, bs].some(v => isNaN(v))) {
      $('err').textContent = '모든 칸에 숫자를 넣어주세요!'; return;
    }
    if (bm < 0 || bm > 59 || bs < 0 || bs > 59) {
      $('err').textContent = '분과 초는 0~59 사이로 넣어주세요!'; return;
    }
    if (bh < 0 || bh > 12) { $('err').textContent = '처음 시각(시)은 0~12 사이로!'; return; }
    if (bh > ah) { $('err').textContent = '⚠️ "시"에서 받아내림이 생겨요. 처음 시각의 시를 작게 해주세요.'; return; }
    if (bm > am) { $('err').textContent = '⚠️ "분"에서 받아내림이 생겨요. 처음 시각의 분을 작게 해주세요.'; return; }
    if (bs > as) { $('err').textContent = '⚠️ "초"에서 받아내림이 생겨요. 처음 시각의 초를 작게 해주세요.'; return; }
    state.a = { h: ah, m: am, s: as };
    state.b = { h: bh, m: bm, s: bs };
    state.c = { h: ah - bh, m: am - bm, s: as - bs };
    state.todo = { h: bh, m: bm, s: bs };
    state.totals = { h: ah, m: am, s: as };
    state.dots = {
      h: new Array(ah).fill(false),
      m: new Array(am).fill(false),
      s: new Array(as).fill(false),
    };
    state.active = true;
    refresh();
    if (bh === 0 && bm === 0 && bs === 0) {
      setMessage('처음 시각이 0이에요. 그대로가 답이 돼요!');
    } else {
      setMessage('💡 결과 칸의 <b>동그라미</b>를 클릭/드래그해서 지워봐요! ✏️');
    }
  }
}

// ===== 랜덤 문제 =====
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randomProblem() {
  ensureAudio();
  if (state.mode === 'add') {
    const ah = rand(1, 10);
    const bh = rand(1, 12 - ah);
    const am = rand(5, 50);
    const bm = rand(1, 59 - am);
    const as = rand(5, 50);
    const bs = rand(1, 59 - as);
    $('a-h').value = ah; $('a-m').value = am; $('a-s').value = as;
    $('b-h').value = bh; $('b-m').value = bm; $('b-s').value = bs;
  } else {
    // 뺄셈: 받아내림 없이 - 빼지는 수의 각 자리가 빼는 수보다 크거나 같게
    const ah = rand(2, 12);
    const am = rand(10, 59);
    const as = rand(10, 59);
    const bh = rand(1, ah - 1);
    const bm = rand(0, am);
    const bs = rand(0, as);
    $('a-h').value = ah; $('a-m').value = am; $('a-s').value = as;
    $('b-h').value = bh; $('b-m').value = bm; $('b-s').value = bs;
  }
  startProblem();
}

// ===== 자동으로 풀기 =====
function autoSolve() {
  if (!state.active) return;
  ensureAudio();
  const isAdd = (state.mode === 'add');
  const interval = setInterval(() => {
    let kind = null;
    if (state.todo.s > 0) kind = 's';
    else if (state.todo.m > 0) kind = 'm';
    else if (state.todo.h > 0) kind = 'h';
    if (kind === null) { clearInterval(interval); return; }
    let idx = -1;
    if (isAdd) {
      for (let i = state.a[kind]; i < state.totals[kind]; i++) {
        if (!state.dots[kind][i]) { idx = i; break; }
      }
    } else {
      idx = state.dots[kind].findIndex(v => !v);
    }
    if (idx === -1) { clearInterval(interval); return; }
    actAt(kind, idx);
    if (!state.active) clearInterval(interval);
  }, 220);
}

// ===== 리셋 =====
function resetProblem() {
  state.active = false;
  state.a = { h: 0, m: 0, s: 0 };
  state.b = { h: 0, m: 0, s: 0 };
  state.c = { h: 0, m: 0, s: 0 };
  state.todo = { h: 0, m: 0, s: 0 };
  state.totals = { h: 0, m: 0, s: 0 };
  state.dots = { h: [], m: [], s: [] };
  state.dragging = false;
  clearEquation();
  $('err').textContent = '';
  setMessage('문제를 입력하고 <b>"문제 시작!"</b> 버튼을 눌러보세요 😊');
}

// 초기화
resetProblem();
